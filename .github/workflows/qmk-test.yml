name: QMK Compile Tests

on:
  pull_request:
  push:
    branches: [main]

env:
  QMK_HOME: /qmk_firmware

jobs:
  compile-per-option:
    name: Compile per-option (${{ matrix.target }})
    runs-on: ubuntu-latest
    container:
      image: qmkfm/qmk_cli:latest
    strategy:
      fail-fast: false
      matrix:
        target: [arsenik, selenium]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load config
        run: |
          . $GITHUB_WORKSPACE/.env
          echo "QMK_VERSION=$QMK_VERSION" >> $GITHUB_ENV
          echo "QMK_KEYBOARD=$QMK_KEYBOARD" >> $GITHUB_ENV
          echo "QMK_LAYOUT=$QMK_LAYOUT" >> $GITHUB_ENV

      - name: Setup QMK firmware
        run: qmk setup -y -b $QMK_VERSION

      - name: Configure QMK
        run: |
          qmk config user.keyboard=$QMK_KEYBOARD
          qmk config user.keymap=default
          qmk config user.qmk_home=$QMK_HOME

      - name: Compile per-option tests
        run: bash $GITHUB_WORKSPACE/tests/test_per_option.sh -target ${{ matrix.target }} -kb $QMK_KEYBOARD -layout $QMK_LAYOUT -j 0

  compile-layouts:
    name: Compile layout (${{ matrix.layout.name }} / ${{ matrix.target }})
    runs-on: ubuntu-latest
    container:
      image: qmkfm/qmk_cli:latest
    strategy:
      fail-fast: false
      matrix:
        target: [arsenik, selenium]
        # One (board, branch) pair per ONEDEADKEY_LAYOUT_* branch the canonical
        # split_3x6_3 board (compile-per-option) never activates. Each board is
        # the smallest mainline QMK target that exposes the branch's LAYOUT
        # macro; the ex2 boards are RP2040, the rest AVR. planck/rev5 exposes
        # ortho_4x12, the planck_grid alias and planck_mit.
        layout:
          - { kb: planck/rev5, name: ortho_4x12 }
          - { kb: planck/rev5, name: planck_grid }
          - { kb: boardsource/5x12, name: ortho_5x12 }
          - { kb: 40percentclub/5x5, name: ortho_5x10 }
          - { kb: marksard/rhymestone/rev1, name: ortho_4x10 }
          - { kb: keebio/iris/rev2, name: keebio_iris }
          - { kb: a_dux, name: split_3x5_2 }
          - { kb: gboards/gergoplex, name: split_3x5_3 }
          - { kb: crkbd/rev4_0/standard, name: split_3x6_3_ex2 }
          - { kb: cornifi, name: split_3x5_3_ex2 }
          - { kb: lily58/rev1, name: lily58 }
          - { kb: sofle/rev1, name: sofle }
          - { kb: keyboardio/atreus, name: keyboardio_atreus }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load config
        run: |
          . $GITHUB_WORKSPACE/.env
          echo "QMK_VERSION=$QMK_VERSION" >> $GITHUB_ENV

      - name: Setup QMK firmware
        run: qmk setup -y -b $QMK_VERSION

      - name: Configure QMK
        run: |
          qmk config user.keyboard=${{ matrix.layout.kb }}
          qmk config user.keymap=default
          qmk config user.qmk_home=$QMK_HOME

      - name: Compile layout branch
        run: bash $GITHUB_WORKSPACE/tests/test_layouts.sh -target ${{ matrix.target }} -kb ${{ matrix.layout.kb }} -layout ${{ matrix.layout.name }} -j 0

  compile-exhaustive:
    name: Compile exhaustive (${{ matrix.target }})
    needs: compile-per-option
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    container:
      image: qmkfm/qmk_cli:latest
    strategy:
      fail-fast: false
      matrix:
        target: [arsenik, selenium]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load config
        run: |
          . $GITHUB_WORKSPACE/.env
          echo "QMK_VERSION=$QMK_VERSION" >> $GITHUB_ENV
          echo "QMK_KEYBOARD=$QMK_KEYBOARD" >> $GITHUB_ENV
          echo "QMK_LAYOUT=$QMK_LAYOUT" >> $GITHUB_ENV

      - name: Setup QMK firmware
        run: qmk setup -y -b $QMK_VERSION

      - name: Configure QMK
        run: |
          qmk config user.keyboard=$QMK_KEYBOARD
          qmk config user.keymap=default
          qmk config user.qmk_home=$QMK_HOME

      - name: Compile exhaustive tests
        run: bash $GITHUB_WORKSPACE/tests/test_exhaustive.sh -target ${{ matrix.target }} -kb $QMK_KEYBOARD -layout $QMK_LAYOUT -j 0
